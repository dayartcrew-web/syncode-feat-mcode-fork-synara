name: Desktop E2E (Tauri boot)

# DSK-3 — boots the actual Tauri desktop binary under xvfb-run (Linux) and
# verifies the full `.setup()` path: webview window creation → ws_setup::boot()
# → managed WsRuntimeState → /ws listener. Closes the "boot E2E not verified"
# gap in docs/STATUS.md.
#
# Two test layers run here:
#   1. ws_setup_boot_wiring_e2e — headless WS-layer wiring test (always runs,
#      no display needed). Proves boot() + WsRuntimeState + WS connect end-to-end.
#   2. desktop_binary_boot_connects_ws — connects to the actual binary booted
#      under xvfb-run. Proves the full shell (window + IPC + WS) comes up.
#
# The binary needs the compiled frontend dist (tauri::generate_context! embeds it
# at compile time), so we build the frontend first, then the binary, then boot
# it under a virtual display.
on:
  push:
    branches: [master]
    paths:
      - "crates/syncode-tauri/**"
      - "crates/syncode-ws/**"
      - "crates/syncode-orchestration/**"
      - "crates/syncode-persistence/**"
      - "crates/syncode-provider/**"
      - "frontend/**"
      - ".github/workflows/desktop-e2e.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [master]
    paths:
      - "crates/syncode-tauri/**"
      - "crates/syncode-ws/**"
      - "crates/syncode-orchestration/**"
      - "crates/syncode-persistence/**"
      - "crates/syncode-provider/**"
      - "frontend/**"
      - ".github/workflows/desktop-e2e.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch: # allow manual runs on any branch

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # WS port the binary will bind — pinned so the test step knows where to point.
  SYNCODE_WS_PORT: "30142"
  SYNCODE_DB: "" # in-memory → hermetic, no SQLite file left behind
  DESKTOP_E2E_WS_URL: "ws://127.0.0.1:30142/ws"

jobs:
  boot-e2e:
    name: Desktop boot E2E (Linux xvfb)
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            weston

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Cache cargo target/ + registry (replaces Swatinem/rust-cache, avoiding
      # its Node punycode deprecation noise). Target key includes the rustc
      # version hash so a toolchain bump invalidates compiled artifacts.
      - name: Get rustc version
        id: rustc
        run: echo "hash=$(rustc -V | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache cargo (registry + target)
        # Swatinem/rust-cache is purpose-built for Rust: it caches the registry
        # AND target/ together with a consistent key that includes the toolchain,
        # so a restored target always matches its proc-macro artifacts. The
        # previous hand-rolled `actions/cache@v6` on a bare `target/` restored a
        # stale target (glib rlib present, glib_macros proc-macro absent) →
        # clippy `E0463: can't find crate for glib_macros`.
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build frontend (dist for tauri::generate_context!)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Clippy (syncode-tauri)
        # The desktop crate is the surface this workflow owns; run clippy here
        # so a lint regression in the binary fails the boot E2E job.
        run: cargo clippy -p syncode-tauri --all-targets -- -D warnings

      - name: Build desktop binary
        run: cargo build -p syncode-tauri

      - name: Run headless WS-layer boot E2E
        # ws_setup_boot_wiring_e2e needs no display — run it before xvfb to fail
        # fast if the wiring itself is broken.
        run: cargo test -p syncode-tauri --test boot_e2e ws_setup_boot_wiring_e2e -- --nocapture

      - name: Boot desktop binary under weston (nested Wayland compositor)
        # webkit2gtk-4.1's webview creation hangs under bare xvfb (no EGL/GL
        # surface). weston is a real Wayland compositor with EGL: run it nested
        # under xvfb (x11-backend), then run the Tauri binary against weston's
        # Wayland display (GDK_BACKEND=wayland) so webkit gets a working EGL
        # surface and .setup() (WS boot) actually runs. LIBGL_ALWAYS_SOFTWARE
        # because CI has no GPU.
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24" bash -c '
            export XDG_RUNTIME_DIR=/tmp/xdg-runtime
            mkdir -p "$XDG_RUNTIME_DIR" && chmod 700 "$XDG_RUNTIME_DIR"
            weston --backend=x11-backend.so --idle-time=0 \
                   --width=1280 --height=800 &
            sleep 4
            export WAYLAND_DISPLAY=wayland-0
            export GDK_BACKEND=wayland
            export LIBGL_ALWAYS_SOFTWARE=1
            exec ./target/debug/syncode-tauri
          ' > desktop.log 2>&1 &
          echo $! > desktop.pid
          # Give weston + setup() (ws_setup::boot + window) a beat to come up.
          sleep 12

      - name: Run full-shell boot E2E against live binary
        env:
          DESKTOP_E2E_WS_URL: ${{ env.DESKTOP_E2E_WS_URL }}
        run: cargo test -p syncode-tauri --test boot_e2e desktop_binary_boot_connects_ws -- --nocapture

      - name: Tear down desktop binary
        if: always()
        run: |
          if [ -f desktop.pid ]; then
            kill "$(cat desktop.pid)" 2>/dev/null || true
            rm -f desktop.pid
          fi
          # Print the binary's captured output so a failed WS-connect (or a
          # crash before ws_setup::boot) is diagnosable in the run log.
          if [ -f desktop.log ]; then
            echo "===== desktop binary log (desktop.log) ====="
            cat desktop.log
            echo "===== end desktop.log ====="
          fi
