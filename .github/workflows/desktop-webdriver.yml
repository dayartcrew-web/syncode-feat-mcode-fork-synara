name: Desktop WebDriver (functional)

# Functional desktop testing via WebdriverIO + the embedded WebDriver server
# (tauri-plugin-wdio-webdriver, compiled in with `--features webdriver`).
# Unlike desktop-e2e.yml (which only verifies the binary BOOTS + WS connects),
# this drives the REAL webview: shell render, no fatal overlay, and (as the
# suite grows) settings persistence, provider dispatch, chat cycle, threads.
# The embedded WebDriver server is NEVER in a shipped release (feature-gated).
on:
  push:
    branches: [master]
    paths:
      - "crates/syncode-tauri/**"
      - "crates/syncode-ws/**"
      - "crates/syncode-orchestration/**"
      - "crates/syncode-provider/**"
      - "frontend/**"
      - "e2e-desktop/**"
      - ".github/workflows/desktop-webdriver.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/syncode-tauri/**"
      - "frontend/**"
      - "e2e-desktop/**"
      - ".github/workflows/desktop-webdriver.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  webdriver:
    name: Desktop WebDriver (Linux weston)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri + weston system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            weston \
            webkit2gtk-driver

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build frontend (dist for tauri::generate_context!)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build desktop test binary (--features webdriver)
        # Release build with the embedded WebDriver server plugin. The binary
        # embeds the frontend dist at compile time.
        run: cargo build --release -p syncode-tauri --features webdriver

      - name: Install WebdriverIO harness
        working-directory: e2e-desktop
        run: npm install --no-audit --no-fund

      - name: Run WebDriver smoke under weston (nested Wayland)
        # The @wdio/tauri-service launches the test binary (which embeds the
        # WebDriver server). webkit2gtk needs a Wayland+GL surface, so we run
        # weston nested under xvfb and export its display before `npm test` —
        # the service-launched app then inherits WAYLAND_DISPLAY/GDK_BACKEND.
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24" bash -c '
            export XDG_RUNTIME_DIR=/tmp/xdg-runtime
            mkdir -p "$XDG_RUNTIME_DIR" && chmod 700 "$XDG_RUNTIME_DIR"
            weston --backend=x11-backend.so --idle-time=0 \
                   --width=1280 --height=800 &
            sleep 4
            export WAYLAND_DISPLAY=wayland-0
            export GDK_BACKEND=wayland
            export LIBGL_ALWAYS_SOFTWARE=1
            cd e2e-desktop
            npm test
          '
