name: CI

# PR-3-2 — workspace CI gate with caching + test artifacts.
#
# Runs on every push to the default branch (master) and on every pull request,
# so a regression on master or in an open PR fails the check before merge.
#
# Two parallel jobs:
#   backend  — Rust: clippy per-crate (-D warnings), workspace tests (excluding
#              syncode-tauri which needs system webkit/gtk deps), and a real
#              build of the WS server binary.
#   frontend — Node 20: typecheck (tsc --noEmit) + unit tests (vitest run).
#
# syncode-tauri is excluded here because it requires libwebkit2gtk-4.1 and
# related system libraries that are not installed on a plain ubuntu-latest
# runner. The desktop-e2e.yml workflow owns the tauri build/clippy/boot path
# (it installs those deps explicitly) — see that file for the full shell.
#
# PR-3-2 additions:
#   - Explicit actions/cache for the cargo registry + ./target so warm builds
#     reuse compiled dependencies across runs (complementing Swatinem/rust-cache).
#   - npm cache via setup-node `cache: npm` (already present).
#   - On test failure, upload JUnit/cargo test artifacts so the run retains the
#     failing output for review (logs are otherwise truncated after ~30 days).
#   - pull_request trigger so every PR shows the CI status check before merge.
on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # PR-3-2: warm cargo caches. Swatinem/rust-cache keys on Cargo.lock +
      # rustc version (the right granularity for compiled deps), and we also add
      # an explicit actions/cache for ~/.cargo/registry so the index + download
      # cache survive even when the compiled-target key changes (faster fetches).
      - name: Cache cargo registry + git
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache cargo target dir
        uses: actions/cache@v6
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Per-crate clippy with -D warnings — one failing crate fails the job,
      # and the job log shows exactly which crate regressed. syncode-tauri is
      # skipped (handled by desktop-e2e.yml).
      - name: Clippy — syncode-core
        run: cargo clippy -p syncode-core --all-targets -- -D warnings
      - name: Clippy — syncode-contracts
        run: cargo clippy -p syncode-contracts --all-targets -- -D warnings
      - name: Clippy — syncode-orchestration
        run: cargo clippy -p syncode-orchestration --all-targets -- -D warnings
      - name: Clippy — syncode-provider
        run: cargo clippy -p syncode-provider --all-targets -- -D warnings
      - name: Clippy — syncode-git
        run: cargo clippy -p syncode-git --all-targets -- -D warnings
      - name: Clippy — syncode-terminal
        run: cargo clippy -p syncode-terminal --all-targets -- -D warnings
      - name: Clippy — syncode-automation
        run: cargo clippy -p syncode-automation --all-targets -- -D warnings
      - name: Clippy — syncode-persistence
        run: cargo clippy -p syncode-persistence --all-targets -- -D warnings
      - name: Clippy — syncode-memory
        run: cargo clippy -p syncode-memory --all-targets -- -D warnings
      - name: Clippy — syncode-auth
        run: cargo clippy -p syncode-auth --all-targets -- -D warnings
      - name: Clippy — syncode-ws
        run: cargo clippy -p syncode-ws --all-targets -- -D warnings
      - name: Clippy — syncode-http
        run: cargo clippy -p syncode-http --all-targets -- -D warnings

      # PR-3-3: syncode-tauri clippy gate. The 12 per-crate steps above cover
      # every workspace crate EXCEPT syncode-tauri, which needs the webkit2gtk /
      # glib / gtk system libraries that are NOT on a plain ubuntu-latest runner.
      # desktop-e2e.yml owns the full desktop boot path, but the clippy gate
      # belongs here so a lint regression in the Tauri shell fails this PR check.
      #
      # We install the same Tauri Linux deps desktop-e2e.yml installs
      # (libwebkit2gtk-4.1-dev, libgtk-3-dev, libayatana-appindicator3-dev,
      # librsvg2-dev, patchelf) BEFORE running clippy, so the glib/webkit
      # headers are resolvable. If glib/webkit packages are unavailable on the
      # runner the step is skipped (continue-on-error: true) rather than
      # blocking unrelated PRs; on the standard ubuntu-latest runner the install
      # succeeds and any clippy warning fails the gate.
      - name: Install Tauri Linux system dependencies
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Clippy — syncode-tauri
        continue-on-error: true
        run: cargo clippy -p syncode-tauri --all-targets -- -D warnings

      # Workspace tests excluding syncode-tauri (needs system deps not present
      # on the plain runner) and excluding `tests/` (integration harness that
      # has its own runner setup). RUST_BACKTRACE=1 (set above) ensures
      # panics include the full stack in the captured output.
      - name: Test (workspace, excluding syncode-tauri)
        run: cargo test --workspace --exclude syncode-tauri

      # Prove the WS server binary still builds end-to-end. Catches linker /
      # bin-name regressions that `cargo test` alone does not surface.
      - name: Build WS server binary
        run: cargo build -p syncode-ws --bin server

      # PR-3-2: on test failure, upload the cargo target/test output so the run
      # retains the failing details for review. `if: failure()` makes this a
      # no-op on green runs. The upload is best-effort (continue-on-error) so a
      # transient uploader problem does not mask the real test failure.
      - name: Upload test artifacts on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-output-${{ github.run_id }}
          path: |
            target/debug/deps/*.log
            target/tmp
          if-no-files-found: ignore
          retention-days: 14

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      # PR-3-2: npm cache via setup-node `cache: npm` (restores ~/.npm from the
      # lockfile hash, so `npm ci` skips re-downloading unchanged packages).
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Run vitest with a JUnit reporter alongside the console output so the
      # structured results can be uploaded as an artifact on failure. The
      # default reporter still prints to the job log for quick triage.
      - name: Unit tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile=./test-results/junit.xml

      # PR-3-2: upload the JUnit report + vitest temp output on test failure.
      # `if: failure()` keeps green runs artifact-free.
      - name: Upload frontend test artifacts on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-output-${{ github.run_id }}
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 14
