name: Changelog

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Print changelog
        run: cat "${{ steps.changelog.outputs.changelog }}"

      - name: Update release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release edit "${{ github.ref_name }}" \
            --notes-file "${{ steps.changelog.outputs.changelog }}" \
            --notes-start-tag "<!-- auto-generated by git-cliff -->" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp "${{ steps.changelog.outputs.changelog }}" CHANGELOG.md
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs(changelog): update for ${{ github.ref_name }}"
          git push origin HEAD:master

      - name: Create PR if push fails
        if: failure()
        run: |
          git checkout -b changelog-${{ github.ref_name }}
          git push origin changelog-${{ github.ref_name }}
          gh pr create \
            --title "docs(changelog): update for ${{ github.ref_name }}" \
            --body "Auto-generated changelog by git-cliff CI." \
            --base master \
            --head changelog-${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
