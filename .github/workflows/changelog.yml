name: Changelog

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: changelog-draft.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Print changelog
        run: cat "${{ steps.changelog.outputs.changelog }}"

      - name: Update release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release edit "${{ github.ref_name }}" \
            --notes-file "${{ steps.changelog.outputs.changelog }}" \
            --notes-start-tag "<!-- auto-generated by git-cliff -->" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only copy if the draft differs from the committed CHANGELOG.md —
          # avoids `cp: same file` when OUTPUT was set to CHANGELOG.md.
          if ! diff -q "${{ steps.changelog.outputs.changelog }}" CHANGELOG.md >/dev/null 2>&1; then
            cp "${{ steps.changelog.outputs.changelog }}" CHANGELOG.md
          fi
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs(changelog): update for ${{ github.ref_name }}"
          git push origin HEAD:master

      - name: Create PR if push fails
        if: failure()
        run: |
          git checkout -B changelog-${{ github.ref_name }}
          # Push quietly to a branch; PR creation may be blocked by repo
          # settings (Actions not permitted to create PRs) — log + continue
          # rather than failing the workflow, since the branch itself is the
          # deliverable and a maintainer can open the PR manually.
          if git push origin changelog-${{ github.ref_name }} --force-with-lease 2>&1; then
            echo "Pushed branch changelog-${{ github.ref_name }} — open the PR manually at:"
            echo "  https://github.com/${{ github.repository }}/compare/master...changelog-${{ github.ref_name }}"
          else
            echo "::warning::Failed to push changelog branch; changelog content already committed via direct push step."
          fi
